<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.18);
    --glass-shadow: rgba(0,0,0,0.25);
    --accent: rgba(255,255,255,0.9);
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.52);
    --pill-active: rgba(255,255,255,0.18);
    --blur: 28px;
    --radius: 20px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    overflow: hidden;
    background: #050608;
    font-family: var(--font);
    color: var(--text-primary);
    user-select: none;
    transition: color 0.4s ease;
  }

  #container {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 30% 20%, #0c0f2a 0%, #050608 55%),
                radial-gradient(ellipse at 80% 85%, #0a0c1f 0%, transparent 60%);
    transition: background 0.5s ease;
  }

  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur)) saturate(180%);
    -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
    box-shadow:
      0 8px 32px var(--glass-shadow),
      inset 0 1px 0 rgba(255,255,255,0.12),
      inset 0 -1px 0 rgba(0,0,0,0.08);
    border-radius: var(--radius);
    transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
  }

  #hud {
    position: fixed;
    top: 24px; left: 24px;
    padding: 16px 20px;
    z-index: 100;
    min-width: 200px;
  }

  .hud-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 12px;
    font-weight: 500;
    transition: color 0.4s ease;
  }

  .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12.5px;
  }
  .hud-row:last-child { border-bottom: none; }

  .hud-key { color: var(--text-secondary); font-weight: 400; transition: color 0.4s ease; }
  .hud-val {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: 0.03em;
    transition: color 0.4s ease;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #5effa0;
    box-shadow: 0 0 8px #5effa0;
    animation: pulse-dot 2.4s ease-in-out infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.4); }
  }

  #stats {
    position: fixed;
    top: 24px; right: 24px;
    padding: 14px 18px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-item { display: flex; flex-direction: column; gap: 4px; }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    font-weight: 500;
    transition: color 0.4s ease;
  }
  .stat-bar {
    width: 100px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.8));
    transition: width 0.4s ease;
  }
  .stat-fill.cpu  { width: 72%; }
  .stat-fill.gpu  { width: 88%; }
  .stat-fill.mem  { width: 58%; }

  #control-panel {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 20px;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
  }

  .toggle-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all 0.25s ease;
    border: 1px solid transparent;
  }
  .toggle-pill.active {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.18);
    color: var(--text-primary);
  }
  .toggle-pill:hover:not(.active) {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.75);
  }

  .pill-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.25s ease;
    flex-shrink: 0;
  }
  .toggle-pill.active .pill-dot {
    background: #a5f3c0;
    box-shadow: 0 0 8px rgba(165,243,192,0.7);
  }

  .panel-divider {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.12);
  }

  #execute-btn, #theme-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 22px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font);
    color: var(--text-primary);
    border: none;
    outline: none;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.14);
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }
  #execute-btn:hover, #theme-btn:hover {
    background: rgba(255,255,255,0.18);
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  #execute-btn:active, #theme-btn:active { transform: translateY(0); }

  .btn-icon {
    width: 14px; height: 14px;
    opacity: 0.8;
    flex-shrink: 0;
  }

  #controls-toggle {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font);
    color: var(--text-primary);
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
  }

  /* ── Light mode overrides ── */
  body.light-mode {
    color: rgba(20,20,40,0.92);
  }
  body.light-mode #container {
    background: radial-gradient(ellipse at 30% 20%, #dde8ff 0%, #f0f4ff 55%),
                radial-gradient(ellipse at 80% 85%, #e8deff 0%, transparent 60%);
  }
  body.light-mode .glass {
    background: rgba(255,255,255,0.55);
    border-color: rgba(255,255,255,0.85);
    box-shadow: 0 8px 32px rgba(100,120,200,0.14),
                inset 0 1px 0 rgba(255,255,255,0.95);
  }
  body.light-mode .hud-key,
  body.light-mode .stat-label { color: rgba(20,20,40,0.48); }
  body.light-mode .hud-val,
  body.light-mode .hud-title  { color: rgba(20,20,40,0.85); }
  body.light-mode .hud-row    { border-bottom-color: rgba(0,0,0,0.06); }
  body.light-mode .stat-bar   { background: rgba(0,0,0,0.06); }
  body.light-mode .stat-fill  { background: linear-gradient(90deg, rgba(80,100,200,0.4), rgba(80,100,200,0.85)); }
  body.light-mode #execute-btn,
  body.light-mode #theme-btn,
  body.light-mode #controls-toggle {
    color: rgba(20,20,40,0.85);
    border-color: rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.6);
    box-shadow: 0 4px 20px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
  }
  body.light-mode #execute-btn:hover,
  body.light-mode #theme-btn:hover {
    background: rgba(255,255,255,0.85);
    box-shadow: 0 8px 28px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.95);
  }
  body.light-mode .toggle-pill { color: rgba(20,20,40,0.48); }
  body.light-mode .toggle-pill.active {
    background: rgba(0,0,0,0.07);
    border-color: rgba(0,0,0,0.14);
    color: rgba(20,20,40,0.85);
  }
  body.light-mode .toggle-pill:hover:not(.active) {
    background: rgba(0,0,0,0.04);
    color: rgba(20,20,40,0.65);
  }
  body.light-mode .panel-divider { background: rgba(0,0,0,0.12); }

  @media (max-width: 768px) {
    #controls-toggle { display: flex; }
    .toggle-group, .panel-divider { display: none; }
    #control-panel.expanded .toggle-group { display: flex; flex-direction: column; }
    #control-panel.expanded .panel-divider { display: block; }
    #control-panel { flex-direction: column; bottom: 20px; }
    #stats { display: none; }
  }

  @media (max-width: 480px) {
    #hud { font-size: 11px; top: 16px; left: 16px; }
  }
</style>

  <div class="hud-row">

    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, composer, controls, bloomPass;
let dataNodes, trailSystem, bgStars;
let bloomTarget = 0.55, bloomCurrent = 0.55;
let time = 0;
let currentViz = 0;
let isTransforming = false;
let transformProgress = 0;
let frameCount = 0, lastFpsTime = performance.now(), fps = 120;
let autoRotate = true, dataFlow = true, showTrails = true;
let isLight = false;

const NODE_COUNT  = 24000;
const TRAIL_COUNT = 6000;
const TRANSFORM_SPEED = 0.018;

const VIZ_NAMES = ['Auroral Flow', 'Plasma Dipole'];
const BLOOM_STRENGTHS = [0.28, 0.55];

const THEMES = {
  dark: {
    bgColor: 0x050608,
    fogColor: 0x050608,
    fogDensity: 0.0008,
    exposure: 1.05,
    starOpacity: 0.6,
    bloom: [0.28, 0.55]
  },
  light: {
    bgColor: 0xf0f4ff,
    fogColor: 0xdde8ff,
    fogDensity: 0.0012,
    exposure: 1.45,
    starOpacity: 0.07,
    bloom: [0.12, 0.22]
  }
};

const PALETTES = [
  // Auroral Flow
  [
    new THREE.Color(0x5bd4f0), new THREE.Color(0x8be8ff),
    new THREE.Color(0x4fb8d0), new THREE.Color(0x7ec8e3),
    new THREE.Color(0x2da8c4), new THREE.Color(0xa8f5e8),
    new THREE.Color(0x6dd4c8), new THREE.Color(0xcef5ff)
  ],
  // Plasma Dipole — black particles for light mode
  [
    new THREE.Color(0x080810), new THREE.Color(0x0d0d18),
    new THREE.Color(0x111120), new THREE.Color(0x090912),
    new THREE.Color(0x050508), new THREE.Color(0x0f0f1a),
    new THREE.Color(0x070710), new THREE.Color(0x060610)
  ]
];

function _hash(n) {
  return (Math.abs(Math.sin(n * 127.1 + 311.7) * 43758.5453)) % 1;
}

function genAuroralFlow(i, count) {
  const t = i / count;
  const bands = 12;
  const band = Math.floor(t * bands);
  const bt = (t * bands) % 1;
  const spread = 130;
  const x = (band / bands - 0.5) * spread;
  const z = Math.sin(band * 0.9) * 24;
  const y = (bt - 0.5) * 110;
  const wave1 = Math.sin(bt * Math.PI * 3 + band * 0.7) * (7 + band * 0.8);
  const wave2 = Math.cos(bt * Math.PI * 2 + band * 1.1) * 4;
  return new THREE.Vector3(x + wave2, y, z + wave1);
}

function genPlasmaDipole(i, count) {
  const FIELD_FRAC = 0.45, DISK_FRAC = 0.38, JET_FRAC = 0.17;
  const fieldEnd = Math.floor(count * FIELD_FRAC);
  const diskEnd  = fieldEnd + Math.floor(count * DISK_FRAC);

  if (i < fieldEnd) {
    const LINES = 28;
    const lineIdx = Math.floor(i / (fieldEnd / LINES));
    const lt      = (i % Math.ceil(fieldEnd / LINES)) / Math.ceil(fieldEnd / LINES);
    const R0  = 14 + lineIdx * 3.8;
    const phi = (lineIdx / LINES) * Math.PI * 2 + lineIdx * 0.22;
    const lambda = (lt - 0.5) * Math.PI * 0.94;
    const cosL = Math.cos(lambda);
    const r = R0 * cosL * cosL;
    const scatter = (_hash(i * 3.1) - 0.5) * 1.2;
    const sAngle  = _hash(i * 7.7) * Math.PI * 2;
    return new THREE.Vector3(
      r * cosL * Math.cos(phi) + Math.cos(sAngle) * scatter * 0.5,
      r * Math.sin(lambda),
      r * cosL * Math.sin(phi) + Math.sin(sAngle) * scatter * 0.5
    );
  } else if (i < diskEnd) {
    const di = i - fieldEnd;
    const dt = di / (diskEnd - fieldEnd);
    const innerR = 10, outerR = 68;
    const r = innerR * Math.pow(outerR / innerR, dt);
    const angle = dt * Math.PI * 14 + _hash(i * 2.3) * 0.6;
    const halfH = 3.5 * (1 - dt * 0.72) + _hash(i * 5.9) * 1.2;
    const y = (_hash(i * 8.1) * 2 - 1) * halfH;
    return new THREE.Vector3(r * Math.cos(angle), y, r * Math.sin(angle));
  } else {
    const ji = i - diskEnd;
    const half = Math.floor((count - diskEnd) / 2);
    const sign = ji < half ? 1 : -1;
    const jt = (ji % half) / half;
    const height = sign * jt * 78;
    const spread = jt * jt * 7.5;
    const twist = jt * Math.PI * 4;
    const angle = _hash(i * 4.3) * Math.PI * 2 + twist;
    const r = _hash(i * 9.1) * spread;
    const knotPull = Math.sin(jt * Math.PI * 6) * 0.4;
    return new THREE.Vector3(
      r * Math.cos(angle) * (1 + knotPull),
      height,
      r * Math.sin(angle) * (1 + knotPull)
    );
  }
}

const GENERATORS = [genAuroralFlow, genPlasmaDipole];

function assignProps(i, colors, sizes, vizIdx) {
  const pal = PALETTES[vizIdx];
  let color, brightness;
  if (vizIdx === 0) {
    const band = Math.floor((i / NODE_COUNT) * 12);
    color = pal[band % pal.length];
    brightness = 0.6 + Math.random() * 0.7;
    sizes[i] = 0.5 + Math.random() * 2.2;
  } else {
    const shell = Math.floor((i / NODE_COUNT) * 5);
    color = pal[shell % pal.length];
    brightness = 0.85 + Math.random() * 0.15;
    sizes[i] = 0.5 + Math.random() * 1.8;
  }
  colors[i*3]   = color.r * brightness;
  colors[i*3+1] = color.g * brightness;
  colors[i*3+2] = color.b * brightness;
}

function makeParticleTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,    'rgba(255,255,255,1.0)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.85)');
  g.addColorStop(0.4,  'rgba(200,230,255,0.35)');
  g.addColorStop(0.75, 'rgba(180,210,255,0.08)');
  g.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
}

function makeTrailTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 32;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(16,16,0,16,16,16);
  g.addColorStop(0,  'rgba(255,255,255,0.7)');
  g.addColorStop(0.5,'rgba(255,255,255,0.2)');
  g.addColorStop(1,  'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,32,32);
  const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
}

function buildDataNodes() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(NODE_COUNT * 3);
  const col = new Float32Array(NODE_COUNT * 3);
  const siz = new Float32Array(NODE_COUNT);
  for (let i = 0; i < NODE_COUNT; i++) {
    const p = GENERATORS[currentViz](i, NODE_COUNT);
    pos[i*3] = p.x; pos[i*3+1] = p.y; pos[i*3+2] = p.z;
    assignProps(i, col, siz, currentViz);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(siz, 1));
  geo.userData.currentColors = new Float32Array(col);
  const mat = new THREE.PointsMaterial({
    size: 3.0, map: makeParticleTexture(),
    vertexColors: true, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  dataNodes = new THREE.Points(geo, mat);
  scene.add(dataNodes);
}

function buildTrails() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(TRAIL_COUNT * 3);
  const col = new Float32Array(TRAIL_COUNT * 3);
  const siz = new Float32Array(TRAIL_COUNT);
  const pal = PALETTES[currentViz];
  for (let i = 0; i < TRAIL_COUNT; i++) {
    pos[i*3]   = (Math.random()-0.5)*120;
    pos[i*3+1] = (Math.random()-0.5)*100;
    pos[i*3+2] = (Math.random()-0.5)*120;
    const c = pal[Math.floor(Math.random()*pal.length)];
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
    siz[i] = Math.random()*1.5 + 0.3;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(siz, 1));
  const mat = new THREE.PointsMaterial({
    size: 1.5, map: makeTrailTexture(),
    vertexColors: true, transparent: true, opacity: 0.45,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  trailSystem = new THREE.Points(geo, mat);
  scene.add(trailSystem);
}

function buildBgStars() {
  const geo = new THREE.BufferGeometry();
  const N = 3000;
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  for (let i = 0; i < N; i++) {
    const r = 250 + Math.random()*350;
    const phi = Math.random()*Math.PI*2;
    const th = Math.random()*Math.PI;
    pos[i*3]   = r*Math.sin(th)*Math.cos(phi);
    pos[i*3+1] = r*Math.sin(th)*Math.sin(phi);
    pos[i*3+2] = r*Math.cos(th);
    const v = 0.08 + Math.random()*0.18;
    col[i*3] = v*0.7; col[i*3+1] = v*0.85; col[i*3+2] = v;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size:0.8, vertexColors:true, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending, depthWrite:false });
  bgStars = new THREE.Points(geo, mat);
  scene.add(bgStars);
}

function init() {
  scene  = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050608, 0.0008);

  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 20, 130);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  document.getElementById('container').appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.rotateSpeed = 0.5;
  controls.zoomSpeed = 0.8;
  controls.minDistance = 30;
  controls.maxDistance = 350;
  controls.enablePan = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.25;

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.55, 0.45, 0.8);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());

  buildDataNodes();
  buildTrails();
  buildBgStars();
  setupEvents();
  animate();
}

function animateFlow() {
  if (!dataNodes || isTransforming || !dataFlow) return;
  const pos = dataNodes.geometry.attributes.position.array;
  if (currentViz === 0) {
    for (let i = 0; i < NODE_COUNT; i++) {
      pos[i*3+1] += 0.28;
      if (pos[i*3+1] > 55) pos[i*3+1] -= 110;
      pos[i*3]   += Math.sin(time*1.5 + i*0.04) * 0.03;
      pos[i*3+2] += Math.cos(time*1.2 + i*0.04) * 0.03;
    }
  } else {
    for (let i = 0; i < NODE_COUNT; i++) {
      const shell = Math.floor((i/NODE_COUNT)*5);
      const sp = 0.004 + shell*0.002;
      const x = pos[i*3], z = pos[i*3+2];
      pos[i*3]   = x*Math.cos(sp) - z*Math.sin(sp);
      pos[i*3+2] = x*Math.sin(sp) + z*Math.cos(sp);
    }
  }
  dataNodes.geometry.attributes.position.needsUpdate = true;
}

function animateTrails() {
  if (!trailSystem || !showTrails) return;
  const pos = trailSystem.geometry.attributes.position.array;
  for (let i = 0; i < TRAIL_COUNT; i++) {
    const ix = i*3, iy=ix+1, iz=ix+2;
    if (currentViz === 0) {
      pos[iy] += 0.35;
      if (pos[iy] > 55) pos[iy] = -55;
      pos[ix] += Math.sin(time*2 + i*0.08)*0.08;
      pos[iz] += Math.cos(time*1.7 + i*0.08)*0.08;
    } else {
      const sp = 0.007 + (i%4)*0.003;
      const x=pos[ix], z=pos[iz];
      pos[ix] = x*Math.cos(sp)-z*Math.sin(sp);
      pos[iz] = x*Math.sin(sp)+z*Math.cos(sp);
    }
  }
  trailSystem.geometry.attributes.position.needsUpdate = true;
}

function startTransform(nextViz) {
  isTransforming = true;
  transformProgress = 0;
  const pos = dataNodes.geometry.attributes.position.array;
  const col = dataNodes.geometry.attributes.color.array;
  const siz = dataNodes.geometry.attributes.size.array;
  const fromPos = new Float32Array(pos);
  const fromCol = new Float32Array(dataNodes.geometry.userData.currentColors);
  const fromSiz = new Float32Array(siz);
  const toPos = new Float32Array(NODE_COUNT*3);
  const toCol = new Float32Array(NODE_COUNT*3);
  const toSiz = new Float32Array(NODE_COUNT);
  for (let i = 0; i < NODE_COUNT; i++) {
    const p = GENERATORS[nextViz](i, NODE_COUNT);
    toPos[i*3]=p.x; toPos[i*3+1]=p.y; toPos[i*3+2]=p.z;
    assignProps(i, toCol, toSiz, nextViz);
  }
  dataNodes.userData = { fromPos, toPos, fromCol, toCol, fromSiz, toSiz, targetViz: nextViz };
  const pal = PALETTES[nextViz];
  const tc = trailSystem.geometry.attributes.color.array;
  for (let i = 0; i < TRAIL_COUNT; i++) {
    const c = pal[Math.floor(Math.random()*pal.length)];
    tc[i*3]=c.r; tc[i*3+1]=c.g; tc[i*3+2]=c.b;
  }
  trailSystem.geometry.attributes.color.needsUpdate = true;
}

function updateFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = Math.round(frameCount*1000/(now-lastFpsTime));
    document.getElementById('fps-display').textContent = fps;
    frameCount = 0; lastFpsTime = now;
  }
}

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  updateFps();
  controls.update();

  const theme = isLight ? THEMES.light : THEMES.dark;
  bloomTarget = theme.bloom[currentViz] ?? theme.bloom[0];
  bloomCurrent += (bloomTarget - bloomCurrent) * 0.04;
  if (bloomPass) bloomPass.strength = bloomCurrent;

  if (bgStars) { bgStars.rotation.y += 0.0002; bgStars.rotation.x += 0.00008; }

  if (isTransforming) {
    transformProgress += TRANSFORM_SPEED;
    const ud = dataNodes.userData;
    const pos = dataNodes.geometry.attributes.position.array;
    const col = dataNodes.geometry.attributes.color.array;
    const siz = dataNodes.geometry.attributes.size.array;
    if (transformProgress >= 1) {
      pos.set(ud.toPos); col.set(ud.toCol); siz.set(ud.toSiz);
      dataNodes.geometry.userData.currentColors = new Float32Array(ud.toCol);
      currentViz = ud.targetViz;
      isTransforming = false; transformProgress = 0;
      dataNodes.material.blending = currentViz === 1 ? THREE.NormalBlending : THREE.AdditiveBlending;
      dataNodes.material.needsUpdate = true;
    } else {
      const t = transformProgress;
      const e = t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
      for (let i=0; i<pos.length; i++) {
        pos[i] = ud.fromPos[i]*(1-e) + ud.toPos[i]*e;
        col[i] = ud.fromCol[i]*(1-e) + ud.toCol[i]*e;
      }
      for (let i=0; i<siz.length; i++) siz[i]=ud.fromSiz[i]*(1-e)+ud.toSiz[i]*e;
    }
    dataNodes.geometry.attributes.position.needsUpdate = true;
    dataNodes.geometry.attributes.color.needsUpdate = true;
    dataNodes.geometry.attributes.size.needsUpdate = true;
  } else {
    animateFlow();
  }

  animateTrails();
  composer.render();
}

function applyTheme(light) {
  const t = light ? THEMES.light : THEMES.dark;
  renderer.setClearColor(t.bgColor, 1);
  scene.fog.color.setHex(t.fogColor);
  scene.fog.density = t.fogDensity;
  renderer.toneMappingExposure = t.exposure;
  if (bgStars) bgStars.material.opacity = t.starOpacity;
  document.body.classList.toggle('light-mode', light);

  // Light → Plasma Dipole (viz 1), Dark → Auroral Flow (viz 0)
  const targetViz = light ? 1 : 0;
  if (!isTransforming && currentViz !== targetViz) {
    // Swap blending immediately so particles turn black right away
    dataNodes.material.blending = targetViz === 1 ? THREE.NormalBlending : THREE.AdditiveBlending;
    dataNodes.material.needsUpdate = true;
    startTransform(targetViz);
    document.getElementById('mode-display').textContent = VIZ_NAMES[targetViz];
  }

  const btn = document.getElementById('theme-btn');
  const icon = document.getElementById('theme-icon');
  if (light) {
    icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
    btn.lastChild.textContent = ' Dark';
  } else {
    icon.innerHTML = `
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
    btn.lastChild.textContent = ' Light';
  }
}

function setupEvents() {
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });

  function makePill(id, getState, setState, labelEl) {
    const el = document.getElementById(id);
    el.addEventListener('click', () => {
      setState(!getState());
      el.classList.toggle('active', getState());
      if (labelEl) labelEl();
    });
  }

  makePill('flow-pill', ()=>dataFlow, v=>{ dataFlow=v; });
  makePill('trails-pill', ()=>showTrails, v=>{
    showTrails=v;
    if(trailSystem) trailSystem.visible=v;
    document.getElementById('trail-display').textContent = v ? 'On' : 'Off';
  });

  document.getElementById('execute-btn').addEventListener('click', () => {
    if (isTransforming) return;
    const next = (currentViz+1) % GENERATORS.length;
    startTransform(next);
    document.getElementById('mode-display').textContent = VIZ_NAMES[next];
  });

  document.getElementById('theme-btn').addEventListener('click', () => {
    isLight = !isLight;
    applyTheme(isLight);
  });

  const toggle = document.getElementById('controls-toggle');
  const panel  = document.getElementById('control-panel');
  toggle.addEventListener('click', () => panel.classList.toggle('expanded'));
}

window.addEventListener('load', init);
</script>
</body>
